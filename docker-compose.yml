services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wakatime-clone-app:latest
    container_name: wakatime_clone_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: wakatime_clone
      DB_USERNAME: wakatime
      DB_PASSWORD: wakatime
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: wakatime_clone_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: wakatime_clone_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wakatime_clone
      MYSQL_USER: wakatime
      MYSQL_PASSWORD: wakatime
    ports:
      - "33060:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  queue:
    image: wakatime-clone-app:latest
    container_name: wakatime_clone_queue
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=60"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: wakatime_clone
      DB_USERNAME: wakatime
      DB_PASSWORD: wakatime
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
